<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torrelodones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Transporte Torrelodones</h1>
            <button id="backBtn" style="display:none" onclick="init()">⬅ Volver</button>
        </header>
        
        <div id="container">
            <p class="loading">Cargando paradas...</p>
        </div>
    </div>
<script>
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyPy6M1TTjLS_AaoG5eKZ-UZSIkhg6Hw2BAIjLbAANy-3MNJy-I8geVfCOtnx1sMg4P/exec";

async function init() {
    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');
    backBtn.style.display = "none";
    container.innerHTML = '<p class="loading">Cargando paradas de Torrelodones...</p>';

    try {
        const res = await fetch(GOOGLE_SHEET_URL);
        const buttons = await res.json();
        container.innerHTML = "";
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = "main-button";
            b.innerText = btn.label;
            b.style.backgroundColor = btn.color || "#444";
            b.onclick = () => getTimes(btn.stopId, btn.label);
            container.appendChild(b);
        });
    } catch (e) {
        container.innerHTML = "<p>Error al cargar el Excel. Revisa los permisos.</p>";
    }
}

async function getTimes(stopId, label) {
    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');
    
    // Indicamos que estamos buscando
    container.innerHTML = `<p class="loading">Buscando buses en ${label}...</p>`;
    backBtn.style.display = "block";

    try {
        const res = await fetch(`/api/proxy?stopId=${stopId}`);
        const data = await res.json();
        
        if (data.error) {
            // Si el proxy nos dice que no encontró nada, mostramos el error y un botón de reintento
            container.innerHTML = `
                <div style="padding:20px; text-align:center;">
                    <p style="font-size:1.5rem; color:#f39c12;">${data.error}</p>
                    <button class="main-button" onclick="getTimes('${stopId}', '${label}')">🔄 REINTENTAR</button>
                </div>`;
        } else {
            // Mostramos el HTML tal cual viene del Consorcio. 
            // Forzamos fondo negro y letra blanca para que sea legible.
            container.innerHTML = `
                <div class="results" style="color:white !important; background:black !important; font-size: 1.2rem; text-align: left;">
                    <div style="padding:10px; border:1px solid #444; margin-bottom:10px; font-size:0.9rem; color:#888;">
                        Resultado para parada: ${stopId}
                    </div>
                    ${data.html}
                </div>`;
        }
    } catch (err) {
        container.innerHTML = `<p style="padding:20px; color:white;">Error de conexión con el servidor de Vercel. Inténtalo de nuevo.</p>`;
    }
}

init();
    </script>
</body>
</html>
