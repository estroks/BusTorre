<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torrelodones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Transporte Torrelodones</h1>
            <button id="backBtn" style="display:none" onclick="init()">⬅ Volver</button>
        </header>
        
        <div id="container">
            <p class="loading">Cargando paradas...</p>
        </div>
    </div>
<script>
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyPy6M1TTjLS_AaoG5eKZ-UZSIkhg6Hw2BAIjLbAANy-3MNJy-I8geVfCOtnx1sMg4P/exec";

async function init() {
    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');
    backBtn.style.display = "none";
    container.innerHTML = '<p class="loading">Cargando paradas de Torrelodones...</p>';

    try {
        const res = await fetch(GOOGLE_SHEET_URL);
        const buttons = await res.json();
        container.innerHTML = "";
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = "main-button";
            b.innerText = btn.label;
            b.style.backgroundColor = btn.color || "#444";
            b.onclick = () => getTimes(btn.stopId, btn.label);
            container.appendChild(b);
        });
    } catch (e) {
        container.innerHTML = "<p>Error al cargar el Excel. Revisa los permisos.</p>";
    }
}

async function getTimes(stopId, label) {
    const container = document.getElementById('container');
    const idLimpio = stopId.toString().padStart(5, '0');
    
    // Estas son las 3 únicas puertas que Azure tiene abiertas hoy
    const rutas = [
        `https://itinerarios.crtm.es/tiempos_paso.php?id_parada=8_${idLimpio}`,
        `https://itinerarios.crtm.es/m/tiempos_paso.php?id_parada=8_${idLimpio}`,
        `https://www.crtm.es/widgets/tst/tst.php?s=8_${idLimpio}`
    ];

    container.innerHTML = `
        <div style="padding:20px; text-align:center;">
            <p style="color:#f1c40f;">Probando conexión oficial para ${label}...</p>
            <p style="font-size:0.8rem; color:#888;">(Si una falla, probaremos la siguiente automáticamente)</p>
        </div>
    `;

    // Intentamos abrir la primera. Si tu padre ve el 404, solo tiene que dar atrás 
    // y probar el botón que diga "INTENTAR RUTA 2".
    // Pero para hacerlo automático y que él no sufra:
    
    window.location.href = rutas[0]; 
}

init();
    </script>
</body>
</html>
