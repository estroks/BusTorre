<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bus Torrelodones</h1>
    <div id="container">
        <p style="text-align:center; color:white; font-size:1.5rem; margin-top:50px;">Cargando botones...</p>
    </div>

    <script>
const GOOGLE_SHEET_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";

// 1. ESTO VA FUERA: El "vigilante" que refresca si vuelves con el botón atrás
window.addEventListener('pageshow', function (event) {
    var historyTraversal = event.persisted || 
                         (typeof window.performance != 'undefined' && 
                          window.performance.navigation.type === 2);
    if (historyTraversal) {
        window.location.reload();
    }
});

// 2. TU FUNCIÓN INIT (Modificada para que no borre todo al pulsar)
async function init() {
    const container = document.getElementById('container');
    try {
        const res = await fetch(GOOGLE_SHEET_URL);
        const buttons = await res.json();
        container.innerHTML = "";

        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = "main-button";
            b.innerText = btn.label;
            b.style.backgroundColor = btn.color || "#444";

            // NUEVA LÓGICA DE CLICK:
            b.onclick = () => {
                // Solo cambiamos el texto del botón que pulsó
                b.innerText = "Abriendo...";
                b.style.opacity = "0.7";
                
                // Vamos a Google Maps
                window.location.href = btn.url;
            };
            container.appendChild(b);
        });
    } catch (e) {
        container.innerHTML = "<p style='color:red; text-align:center;'>Error al cargar. Revisa los permisos.</p>";
    }
}

init();
</script>
</body>
</html>
