<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torrelodones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Transporte Torrelodones</h1>
            <button id="backBtn" style="display:none" onclick="init()">⬅ Volver</button>
        </header>
        
        <div id="container">
            <p class="loading">Cargando paradas...</p>
        </div>
    </div>
<script>
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyPy6M1TTjLS_AaoG5eKZ-UZSIkhg6Hw2BAIjLbAANy-3MNJy-I8geVfCOtnx1sMg4P/exec";

async function init() {
    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');
    backBtn.style.display = "none";
    container.innerHTML = '<p class="loading">Cargando paradas de Torrelodones...</p>';

    try {
        const res = await fetch(GOOGLE_SHEET_URL);
        const buttons = await res.json();
        container.innerHTML = "";
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = "main-button";
            b.innerText = btn.label;
            b.style.backgroundColor = btn.color || "#444";
            b.onclick = () => getTimes(btn.stopId, btn.label);
            container.appendChild(b);
        });
    } catch (e) {
        container.innerHTML = "<p>Error al cargar el Excel. Revisa los permisos.</p>";
    }
}

async function getTimes(stopId, label) {
    // 1. Corregimos el ID (Aseguramos los 5 dígitos)
    let idLimpio = stopId.toString().length === 4 ? "0" + stopId : stopId;

    // 2. Esta es la URL que el Consorcio NO puede bloquear porque es la de sus propios QR
    // Usamos el formato que hemos visto en tu imagen
    const urlOficial = `https://itinerarios.crtm.es/tiempos_paso.php?id_parada=8_${idLimpio}`;

    // 3. LA MAGIA: En lugar de un iframe que da error, abrimos la web oficial.
    // Usamos "_self" para que se abra en la misma ventana. 
    // Tu padre solo tiene que usar el botón "ATRÁS" del móvil para volver a los botones.
    window.location.href = urlOficial;
}

init();
    </script>
</body>
</html>
