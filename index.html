<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torrelodones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Transporte Torrelodones</h1>
            <button id="backBtn" style="display:none" onclick="init()">⬅ Volver</button>
        </header>
        
        <div id="container">
            <p class="loading">Cargando paradas...</p>
        </div>
    </div>
<script>
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyPy6M1TTjLS_AaoG5eKZ-UZSIkhg6Hw2BAIjLbAANy-3MNJy-I8geVfCOtnx1sMg4P/exec";

async function init() {
    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');
    backBtn.style.display = "none";
    container.innerHTML = '<p class="loading">Cargando paradas de Torrelodones...</p>';

    try {
        const res = await fetch(GOOGLE_SHEET_URL);
        const buttons = await res.json();
        container.innerHTML = "";
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = "main-button";
            b.innerText = btn.label;
            b.style.backgroundColor = btn.color || "#444";
            b.onclick = () => getTimes(btn.stopId, btn.label);
            container.appendChild(b);
        });
    } catch (e) {
        container.innerHTML = "<p>Error al cargar el Excel. Revisa los permisos.</p>";
    }
}

async function getTimes(stopId, label) {
    // 1. Limpiamos el ID
    let idStr = stopId.toString().padStart(5, '0');

    // 2. Creamos la búsqueda mágica para Google Maps
    // Esta búsqueda abre directamente la "Ficha de Parada" con los tiempos en tiempo real
    const urlGoogle = `https://www.google.com/maps/search/?api=1&query=parada+${idStr}+Torrelodones`;

    // 3. Pantalla de carga elegante
    const container = document.getElementById('container');
    container.innerHTML = `
        <div style="padding:40px; text-align:center;">
            <h2 style="color:#f1c40f; font-size:2rem;">Abriendo ${label}</h2>
            <p style="font-size:1.2rem;">Buscando autobuses en el mapa...</p>
            <div style="margin-top:20px; font-size:4rem;">🚌</div>
        </div>`;

    // 4. Salto a Google Maps
    // Al ser un Android, esto abrirá directamente la APP de Google Maps 
    // o la web oficial, que nunca falla.
    setTimeout(() => {
        window.location.href = urlGoogle;
    }, 600);
}

init();
    </script>
</body>
</html>
