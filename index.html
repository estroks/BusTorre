<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torrelodones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Transporte Torrelodones</h1>
            <button id="backBtn" style="display:none" onclick="init()">⬅ Volver</button>
        </header>
        
        <div id="container">
            <p class="loading">Cargando paradas...</p>
        </div>
    </div>
<script>
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyPy6M1TTjLS_AaoG5eKZ-UZSIkhg6Hw2BAIjLbAANy-3MNJy-I8geVfCOtnx1sMg4P/exec";

async function init() {
    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');
    backBtn.style.display = "none";
    container.innerHTML = '<p class="loading">Cargando paradas de Torrelodones...</p>';

    try {
        const res = await fetch(GOOGLE_SHEET_URL);
        const buttons = await res.json();
        container.innerHTML = "";
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = "main-button";
            b.innerText = btn.label;
            b.style.backgroundColor = btn.color || "#444";
            b.onclick = () => getTimes(btn.stopId, btn.label);
            container.appendChild(b);
        });
    } catch (e) {
        container.innerHTML = "<p>Error al cargar el Excel. Revisa los permisos.</p>";
    }
}

async function getTimes(stopId, label) {
    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');
    backBtn.style.display = "block";
    
    // Si el ID tiene 4 dígitos, le ponemos el 0
    let fullId = stopId.length === 4 ? "0" + stopId : stopId;

    // Esta URL es la oficial que el Consorcio usa para móviles
    // Es la más fiable de todas porque la cargará directamente el móvil de tu padre
    const urlBusca = `https://itinerarios.crtm.es/tiempos_paso.php?id_parada=8_${fullId}`;

    container.innerHTML = `
        <div style="height: 80vh; width: 100%; -webkit-overflow-scrolling: touch; overflow-y: scroll;">
            <p style="text-align:center; color:#f1c40f;">Cargando tiempos de ${label}...</p>
            <iframe 
                src="${urlBusca}" 
                style="width: 100%; height: 100%; border: none; background: white; border-radius: 10px;"
                onload="this.previousElementSibling.style.display='none'">
            </iframe>
        </div>
    `;
}

init();
    </script>
</body>
</html>
