<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bus Torrelodones</h1>
    <div id="container">
        <p style="text-align:center; color:white; font-size:1.5rem; margin-top:50px;">Cargando botones...</p>
    </div>

    <script>
const GOOGLE_SHEET_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";
let ALL_DATA = {}; // Guardaremos los datos aquí

// El "vigilante" para cuando vuelve atrás
window.addEventListener('pageshow', function (event) {
    if (event.persisted || (typeof window.performance != 'undefined' && window.performance.navigation.type === 2)) {
        window.location.reload();
    }
});

async function init() {
    const container = document.getElementById('container');
    container.innerHTML = "<p style='text-align:center; color:white;'>Cargando menú...</p>";
    
    try {
        const res = await fetch(GOOGLE_SHEET_URL);
        ALL_DATA = await res.json();
        showCategories(); // Al inicio, mostramos las secciones (Salir, Volver, etc)
    } catch (e) {
        container.innerHTML = "<p style='color:red;'>Error de conexión.</p>";
    }
}

// PANTALLA 1: Mostrar categorías principales
function showCategories() {
    const container = document.getElementById('container');
    container.innerHTML = ""; // Limpiamos
    
    Object.keys(ALL_DATA).forEach(catName => {
        const b = document.createElement('button');
        b.className = "main-button"; // Usa tu CSS de botones grandes
        b.innerText = catName;
        b.style.backgroundColor = "#444"; // Color neutro para categorías
        b.onclick = () => showSection(catName);
        container.appendChild(b);
    });
}

// PANTALLA 2: Mostrar paradas de una categoría
function showSection(catName) {
    const container = document.getElementById('container');
    container.innerHTML = `<h2 style="color:#f1c40f; text-align:center;">${catName}</h2>`;
    
    // Botón para volver al menú principal
    const backMenu = document.createElement('button');
    backMenu.innerText = "⬅ VOLVER AL MENÚ";
    backMenu.style.width = "100%";
    backMenu.style.padding = "15px";
    backMenu.style.marginBottom = "20px";
    backMenu.onclick = showCategories;
    container.appendChild(backMenu);

    // Botones de las paradas
    ALL_DATA[catName].forEach(btn => {
        const b = document.createElement('button');
        b.className = "main-button";
        b.innerText = btn.label;
        b.style.backgroundColor = btn.color || "#2980b9";
        b.onclick = () => {
            b.innerText = "Abriendo mapa...";
            window.location.href = btn.url;
        };
        container.appendChild(b);
    });
}

init();
</script>
</body>
</html>
