<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Torre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bus Torrelodones</h1>
    <div id="container">
        <p style="text-align:center; color:white; font-size:1.5rem; margin-top:50px;">Cargando botones...</p>
    </div>

    <script>
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyPy6M1TTjLS_AaoG5eKZ-UZSIkhg6Hw2BAIjLbAANy-3MNJy-I8geVfCOtnx1sMg4P/exec";

        async function init() {
            const container = document.getElementById('container');
            try {
                const res = await fetch(GOOGLE_SHEET_URL);
                const buttons = await res.json();
                container.innerHTML = "";

                buttons.forEach(btn => {
                    const b = document.createElement('button');
                    b.className = "main-button";
                    b.innerText = btn.label;
                    b.style.backgroundColor = btn.color || "#444";
                    // AL PULSAR: Abre directamente el link de Google Maps que pusiste en el Excel
                    b.onclick = () => {
                        container.innerHTML = `<h2 style="color:#f1c40f; text-align:center; margin-top:50px;">Abriendo ${btn.label}...</h2>`;
                        window.location.href = btn.url;
                    };
                    container.appendChild(b);
                });
            } catch (e) {
                container.innerHTML = "<p style='color:red; text-align:center;'>Error al cargar el Excel. Revisa los permisos de Google Apps Script.</p>";
            }
        }
        init();
    </script>
</body>
</html>
